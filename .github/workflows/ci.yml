name: 持续集成

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端测试
    runs-on: ubuntu-latest
    env:
      TESTPILOT_DATABASE_URL: sqlite:///./ci_testpilot.db
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 安装后端依赖
        run: pip install -r requirements.txt
      - name: 运行后端测试
        run: pytest

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安装前端依赖
        run: npm install
      - name: 构建前端
        run: npm run build
